name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deno:
    name: Deno Tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type check
        run: deno check --no-lock main.ts

      - name: Run tests
        run: |
          mkdir -p "$HOME/.claude/projects" "$HOME/.claude/sessions"
          deno test --no-lock \
            --allow-read=$HOME/.claude,.,/var/folders,/tmp \
            --allow-env=HOME,PROJECTS_ROOT \
            --allow-write=/var/folders,/tmp \
            --allow-run=git \
            --ignore=tests/pty-manager.test.ts \
            tests/

  swift-linux:
    name: Swift Tests (Linux)
    runs-on: ubuntu-latest
    container:
      image: swift:6.1
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        id: swift_linux_test
        working-directory: swift
        run: |
          set +e
          swift build 2>&1 | tee /tmp/swift-output.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "build exit: $BUILD_EXIT" >> /tmp/swift-output.txt
          swift test 2>&1 | tee -a /tmp/swift-output.txt
          TEST_EXIT=${PIPESTATUS[0]}
          echo "test exit: $TEST_EXIT" >> /tmp/swift-output.txt
          if [ $BUILD_EXIT -ne 0 ] || [ $TEST_EXIT -ne 0 ]; then
            exit 1
          fi

      - name: Post failure details to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/swift-output.txt', 'utf8');
            const body = `### Swift Linux CI Failure\n\`\`\`\n${output.slice(-3000)}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

  swift-macos:
    name: Swift Tests (macOS)
    runs-on: macos-26
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build and test
        id: swift_test
        working-directory: swift
        run: |
          set +e
          swift build 2>&1 | tee /tmp/swift-output.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "build exit: $BUILD_EXIT" >> /tmp/swift-output.txt
          swift test 2>&1 | tee -a /tmp/swift-output.txt
          TEST_EXIT=${PIPESTATUS[0]}
          echo "test exit: $TEST_EXIT" >> /tmp/swift-output.txt
          if [ $BUILD_EXIT -ne 0 ] || [ $TEST_EXIT -ne 0 ]; then
            exit 1
          fi

      - name: Post failure details to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/swift-output.txt', 'utf8');
            const body = `### Swift macOS CI Failure\n\`\`\`\n${output.slice(-3000)}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
