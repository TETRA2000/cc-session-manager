name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deno:
    name: Deno Tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type check
        run: deno check --no-lock main.ts

      - name: Run tests
        run: |
          mkdir -p "$HOME/.claude/projects" "$HOME/.claude/sessions"
          deno test --no-lock \
            --allow-read=$HOME/.claude,.,/var/folders,/tmp \
            --allow-env=HOME,PROJECTS_ROOT \
            --allow-write=/var/folders,/tmp \
            --allow-run=git \
            --ignore=tests/pty-manager.test.ts \
            tests/

  swift-linux:
    name: Swift Tests (Linux)
    runs-on: ubuntu-latest
    container:
      image: swift:6.1
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        working-directory: swift
        run: swift test

  swift-macos:
    name: Swift Tests (macOS)
    runs-on: macos-26
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Run tests
        id: test
        working-directory: swift
        run: swift test 2>&1 | tee /tmp/out.txt
        continue-on-error: true

      - name: Post errors
        if: steps.test.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const lines = fs.readFileSync('/tmp/out.txt', 'utf8').split('\n');
            const errs = lines.filter(l => l.includes('error:') || l.includes('warning:') && l.includes('.swift'));
            const body = `### Swift macOS errors\n\`\`\`\n${errs.slice(0,30).join('\n')}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body
            });

      - name: Fail
        if: steps.test.outcome == 'failure'
        run: exit 1
