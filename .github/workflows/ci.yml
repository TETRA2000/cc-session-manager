name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deno:
    name: Deno Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        run: deno install

      - name: Type check
        run: deno check main.ts

      - name: Setup test directories
        run: mkdir -p "$HOME/.claude/projects" "$HOME/.claude/sessions" "$HOME/Projects/.session-manager"

      - name: Run tests
        run: |
          deno test \
            --allow-read="$HOME/.claude","$HOME/Projects",.,/tmp \
            --allow-env=HOME,PROJECTS_ROOT \
            --allow-write="$HOME/Projects",/tmp \
            --allow-run=git \
            --ignore=tests/pty-manager.test.ts \
            tests/ 2>&1 | tee /tmp/deno-test-output.txt
        continue-on-error: true

      - name: Show test output on failure
        if: failure()
        run: cat /tmp/deno-test-output.txt 2>/dev/null || echo "No output captured"

      - name: Check test result
        run: |
          if grep -q "FAILED" /tmp/deno-test-output.txt 2>/dev/null; then
            echo "Tests failed!"
            exit 1
          fi
          if ! grep -q "ok |" /tmp/deno-test-output.txt 2>/dev/null; then
            echo "Tests did not complete successfully"
            cat /tmp/deno-test-output.txt 2>/dev/null
            exit 1
          fi

  swift-linux:
    name: Swift Tests (Linux)
    runs-on: ubuntu-latest
    container:
      image: swift:6.1
    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: swift
        run: swift build

      - name: Run tests
        working-directory: swift
        run: swift test

  swift-macos:
    name: Swift Tests (macOS)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: swift
        run: swift build

      - name: Run unit tests
        working-directory: swift
        run: swift test

      - name: Build for iOS (compile check)
        working-directory: swift
        run: |
          xcodebuild build \
            -scheme CCSessionAPI \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO
