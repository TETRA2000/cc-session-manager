name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deno:
    name: Deno Tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type check
        run: deno check --no-lock main.ts

      - name: Run tests
        run: |
          mkdir -p "$HOME/.claude/projects" "$HOME/.claude/sessions"
          deno test --no-lock \
            --allow-read=$HOME/.claude,.,/var/folders,/tmp \
            --allow-env=HOME,PROJECTS_ROOT \
            --allow-write=/var/folders,/tmp \
            --allow-run=git \
            --ignore=tests/pty-manager.test.ts \
            tests/

  swift-linux:
    name: Swift Tests (Linux)
    runs-on: ubuntu-latest
    container:
      image: swift:6.1
    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: swift
        run: swift build

      - name: Run tests
        working-directory: swift
        run: swift test

  swift-macos:
    name: Swift Tests (macOS)
    runs-on: macos-26
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        id: swift_macos
        working-directory: swift
        run: |
          set +e
          swift build 2>&1 | tee /tmp/swift-output.txt
          BUILD=$?
          echo "--- BUILD EXIT: $BUILD ---" >> /tmp/swift-output.txt
          if [ $BUILD -eq 0 ]; then
            swift test 2>&1 | tee -a /tmp/swift-output.txt
            TEST=$?
            echo "--- TEST EXIT: $TEST ---" >> /tmp/swift-output.txt
          fi
          exit $((BUILD + ${TEST:-1}))
        continue-on-error: true

      - name: Post failure to PR
        if: steps.swift_macos.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/swift-output.txt', 'utf8');
            const lines = output.split('\n');
            const errorLines = lines.filter(l => l.includes('error:') || l.includes('EXIT:'));
            const tail = lines.slice(-30).join('\n');
            const body = `### Swift macOS Failure\nErrors:\n\`\`\`\n${errorLines.join('\n')}\n\`\`\`\nTail:\n\`\`\`\n${tail}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Fail if needed
        if: steps.swift_macos.outcome == 'failure'
        run: exit 1
