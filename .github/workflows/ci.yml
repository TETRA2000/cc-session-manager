name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  deno:
    name: Deno Tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type check and test
        id: deno_test
        run: |
          set +e
          echo "=== deno --version ===" > /tmp/ci-output.txt
          deno --version >> /tmp/ci-output.txt 2>&1
          echo "" >> /tmp/ci-output.txt
          echo "=== deno check ===" >> /tmp/ci-output.txt
          deno check --no-lock main.ts >> /tmp/ci-output.txt 2>&1
          CHECK_EXIT=$?
          echo "check exit: $CHECK_EXIT" >> /tmp/ci-output.txt
          echo "" >> /tmp/ci-output.txt
          echo "=== deno test ===" >> /tmp/ci-output.txt
          mkdir -p "$HOME/.claude/projects" "$HOME/.claude/sessions"
          deno test --no-lock \
            --allow-read=$HOME/.claude,.,/var/folders,/tmp \
            --allow-env=HOME,PROJECTS_ROOT \
            --allow-write=/var/folders,/tmp \
            --allow-run=git \
            --ignore=tests/pty-manager.test.ts \
            tests/ >> /tmp/ci-output.txt 2>&1
          TEST_EXIT=$?
          echo "test exit: $TEST_EXIT" >> /tmp/ci-output.txt
          cat /tmp/ci-output.txt
          if [ $CHECK_EXIT -ne 0 ] || [ $TEST_EXIT -ne 0 ]; then
            exit 1
          fi

      - name: Post failure details to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/ci-output.txt', 'utf8');
            const body = `### Deno CI Failure\n\`\`\`\n${output.slice(-3000)}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

  swift-linux:
    name: Swift Tests (Linux)
    runs-on: ubuntu-latest
    container:
      image: swift:6.1
    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: swift
        run: swift build

      - name: Run tests
        working-directory: swift
        run: swift test

  swift-macos:
    name: Swift Tests (macOS)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: swift
        run: swift build

      - name: Run unit tests
        working-directory: swift
        run: swift test
