name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deno:
    name: Deno Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type check
        run: deno check main.ts

      - name: Run tests
        run: |
          mkdir -p $HOME/.claude/projects $HOME/.claude/sessions
          deno test \
            --allow-read=$HOME/.claude,.,/tmp \
            --allow-env=HOME,PROJECTS_ROOT \
            --allow-write=/tmp \
            --allow-run=git \
            --ignore=tests/pty-manager.test.ts \
            tests/

  swift-linux:
    name: Swift Tests (Linux)
    runs-on: ubuntu-latest
    container: swift:6.1
    defaults:
      run:
        working-directory: swift
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

  swift-macos:
    name: Swift Tests (macOS)
    runs-on: macos-26
    defaults:
      run:
        working-directory: swift
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Run unit tests
        run: swift test

      - name: Build for iOS (compile check)
        run: xcodebuild build -scheme CCSessionAPI -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' -skipPackagePluginValidation
