name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deno:
    name: Deno Tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type check
        run: deno check --no-lock main.ts

      - name: Run tests
        run: |
          mkdir -p "$HOME/.claude/projects" "$HOME/.claude/sessions"
          deno test --no-lock \
            --allow-read=$HOME/.claude,.,/var/folders,/tmp \
            --allow-env=HOME,PROJECTS_ROOT \
            --allow-write=/var/folders,/tmp \
            --allow-run=git \
            --ignore=tests/pty-manager.test.ts \
            tests/

  swift-linux:
    name: Swift Tests (Linux)
    runs-on: ubuntu-latest
    container:
      image: swift:6.1
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: swift
        run: swift build

      - name: Run tests
        id: swift_linux_test
        working-directory: swift
        run: |
          swift test 2>&1 | tee /tmp/swift-test-output.txt
        continue-on-error: true

      - name: Post failure details to PR
        if: steps.swift_linux_test.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/swift-test-output.txt', 'utf8');
            const lines = output.split('\n');
            const tail = lines.slice(-60).join('\n');
            const body = `### Swift Linux Test Failure\n\`\`\`\n${tail}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Fail if tests failed
        if: steps.swift_linux_test.outcome == 'failure'
        run: exit 1

  swift-macos:
    name: Swift Tests (macOS)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: swift
        run: swift build

      - name: Run unit tests
        working-directory: swift
        run: swift test
